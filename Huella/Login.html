        <link href="https://fonts.googleapis.com" rel="stylesheet">

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="https://media.canva.com/v2/files/uri:ifs%3A%2F%2FZ%2Fthumbnail-file-zAG195Xdycg.png?csig=AAAAAAAAAAAAAAAAAAAAAM-HA5iOGgsh2FnW8d5dMLYPwUVVqG3lVwJOT4jQk6_x&exp=1773413750&signer=scene-rpc&token=AAIAAVoAHnRodW1ibmFpbC1maWxlLXpBRzE5NVhkeWNnLnBuZwAAAAABnOeyVShr9ra350G2N6vffs5wYOU-Bl2v6TBiRHtKvJTCaFhpxw"
                    width="50" height="50"
                    class="site-header__logo"
                >
                <h1 class="site-header__title">Huella</h1>
            </div>
            <button class="site-header__button">Registrarse</button>
        </header>

        <main class="login-section">
           
            <section class="login-section__welcome">
                <img src="/imagenes/img_5.png">
                <p class="welcome__title">¡Bienvenido a Huella!</p>
                <p class="welcome__subtitle">La pagina que te ayuda a encontrar mascotas perdidas!</p>
            </section>
            

            <section class="login-section__card">
                <label class="card__title">Inicia Sesión</label>
                <button class="card__btn card__btn--google">
                    <img src="https://image.similarpng.com/file/similarpng/very-thumbnail/2020/06/Logo-google-icon-PNG.png"
                        width="20" height="20"
                        class="card__btn-icon"
                    >
                    <label>Continuar con Google</label>
                </button>
                <div class="card__divider">
                    <span class="card__divider-text">o con tu email</span>
                </div>
                <div class="card__inputs">
                    <div class="card__field">
                        <label class="card__label">Email</label>
                        <input class="card__input" placeholder="tu@email.com">
                    </div>
                    <div class="card__field">
                        <label class="card__label">Contraseña</label>
                        <input class="card__input" placeholder="••••••••">
                    </div>
                </div>
                <a class="card__link card__link--pwd">¿Olvidaste tu contraseña?</a>
                <button class="card__btn card__btn--send">Iniciar Sesion</button>
                <p class="card__hint">¿No tienes cuenta?
                    <a href="SignUp.html" class="card__link">Registrate aqui</a>
                </p>
            </section>
