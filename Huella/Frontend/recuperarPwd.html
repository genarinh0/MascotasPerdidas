<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recuperar contraseña | Huella</title>
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <h2 class="site-header__heading">Recuperar contraseña</h2>
            <button class="site-header__button" onclick="window.location.href='login.html'">Iniciar Sesión</button>
        </header>

        <main class="login-section" style="justify-content: center; padding-top: 60px;">
            <section class="login-section__card">
                <label class="card__title">¿Olvidaste tu contraseña?</label>

                <p style="text-align: center; color: var(--card-font-color); font-size: 14px; font-family: var(--font-secondary); margin: 0 0 20px 0; max-width: 280px;">
                    Ingresa tu correo y te enviaremos un enlace para restablecerla.
                </p>

                <div class="card__inputs" style="width: 100%;">
                    <div class="card__field">
                        <label class="card__label">Correo electrónico</label>
                        <input
                            class="card__input"
                            type="email"
                            id="email"
                            placeholder="tu@email.com"
                        >
                    </div>
                </div>

                <button class="card__btn card__btn--send" id="btnRecuperar" style="margin-top: 20px;">
                    Enviar instrucciones
                </button>

                <p class="card__hint">
                    ¿Recordaste tu contraseña?
                    <a class="card__link" href="login.html">Volver al inicio de sesión</a>
                </p>
            </section>
        </main>

        <script src="js/recuperarPwd.js"></script>
    </body>
</html>
