<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <button class="site-header__button" id="btnCancelNav">Cancelar</button>
        </header>

        <main class="login-section" style="justify-content: center; padding-bottom: 50px;">
            <section class="login-section__card">
                <label class="card__title">Crear Publicación</label>
                
                <form class="card__inputs">
                    <div class="card__field">
                        <label class="card__label">Especie *</label>
                        <select class="card__input card__input--select" required>
                            <option value="" disabled selected>Selecciona...</option>
                            <option value="perro">Perro</option>
                            <option value="gato">Gato</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="card__field">
                        <label class="card__label">Raza (Opcional)</label>
                        <input class="card__input" placeholder="Ej: Golden Retriever">
                    </div>

                    <div class="card__field">
                        <label class="card__label">Tamaño *</label>
                        <select class="card__input card__input--select" required>
                            <option value="pequeño">Pequeño</option>
                            <option value="mediano">Mediano</option>
                            <option value="grande">Grande</option>
                        </select>
                    </div>

                    <div class="card__field">
                        <label class="card__label">Color (Selecciona varios) *</label>
                        <div class="color-selector">
                            <label class="color-option"><input type="checkbox" value="blanco"> Blanco</label>
                            <label class="color-option"><input type="checkbox" value="negro"> Negro</label>
                            <label class="color-option"><input type="checkbox" value="cafe"> Café</label>
                            <label class="color-option"><input type="checkbox" value="gris"> Gris</label>
                        </div>
                    </div>

                    <div class="card__field">
                        <label class="card__label">Ubicación aproximada *</label>
                        <select class="card__input card__input--select" required>
                            <option value="" disabled selected>Selecciona zona...</option>
                            <option value="norte">Zona Norte</option>
                            <option value="sur">Zona Sur</option>
                            <option value="poniente">Zona Poniente</option>
                            <option value="oriente">Zona Oriente</option>
                            <option value="centro">Centro</option>
                        </select>
                    </div>

                    <div class="card__field">
                        <label class="card__label">Fecha de pérdida *</label>
                        <input type="date" class="card__input card__input--date" required>
                    </div>

                    <div class="card__field">
                        <label class="card__label">Horario de contacto (Opcional)</label>
                        <input class="card__input" placeholder="Ej: 9:00 AM - 6:00 PM">
                    </div>

                    <div class="card__field">
                        <label class="card__label">Fotografía(s) *</label>
                        <div class="file-upload">
                            <input type="file" id="photos" class="file-upload__input" multiple required>
                            <label for="photos" class="file-upload__label">
                                <img src="imagenes/iconos/icono_camara.png" width="24">
                                <span>Subir fotos</span>
                            </label>
                        </div>
                    </div>

                    <div class="card__field">
                        <label class="card__label">Descripción *</label>
                        <textarea class="card__input card__input--textarea" placeholder="Danos más detalles..." required></textarea>
                    </div>

                    <button type="submit" class="card__btn card__btn--send" style="margin-top: 20px; width: 100%;">Publicar</button>
                </form>
            </section>
        </main>
    </body>
</html>
