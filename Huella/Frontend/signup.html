<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
        <script src="https://accounts.google.com" async defer></script>
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <button class="site-header__button" id="btnLoginNav">Iniciar Sesión</button>
        </header>

        <main class="login-section">
            <section class="login-section__welcome">
                <img src="imagenes/img_5.png" class="welcome__img">
                <p class="welcome__title">¡Únete a la manada!</p>
                <p class="welcome__subtitle">¡Ayúdanos a traer a todos a casa!</p>
            </section>

            <section class="login-section__card">
                <label class="card__title">Crea nueva cuenta</label>
                
                <div id="google-button"></div>
                
                <div class="divider"></div>

                <div class="card__inputs">
                    <div class="card__field">
                        <label class="card__label">Email</label>
                        <input class="card__input" placeholder="tu@email.com" id="email">
                    </div>
                    <div class="card__field">
                        <label class="card__label">Contraseña</label>
                        <input class="card__input" type="password" placeholder="••••••••" id="password">
                    </div>
                    <div class="card__field">
                        <label class="card__label">Confirma tu contraseña</label>
                        <input class="card__input" type="password" placeholder="••••••••" id="confirm_password">
                    </div>
                </div>

                <button class="card__btn card__btn--send" id="btnSignup">Registrate</button>
                
                <p class="card__hint">¿Ya tienes cuenta?
                    <a class="card__link" href="login.html">Inicia sesión aquí</a>
                </p>
            </section>
        </main>

        <section class="guest-section">
            <div class="guest-section__card">
                <p class ="guest-section__text">¿Quieres darle un vistazo al <b>feed sin iniciar sesión</b>?</p>
                <button class ="card__btn card__btn--send" id="btnGuestFeed">Ver feed sin cuenta</button>
            </div>
        </section>

        <footer class ="site-footer">
            <p>Proyecto realizado por alumnos del Tec de Monterrey, 2026</p>
        </footer>

        <script src="js/signup.js"></script>
    </body>
</html>
