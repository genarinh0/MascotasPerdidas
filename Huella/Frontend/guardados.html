<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css/guardados_styles.css">
        <link rel="stylesheet" href="css/componentes.css">
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <h1 class="site-header__heading">Mis Guardados</h1>
            <button class="site-header__profile-btn">
                <label class="site-header__profile-label">Mi Perfil</label>
                <img class="site-header__profile-icon" src="imagenes/IconoPerfil.png" width="45" height="45">
            </button>
        </header>
        <main class="saved-feed">
            <article class="pub-card">
                <div class="pub-card__title">
                    <label>¡Busca a su Familia!</label>
                    <button class="pub-card__save-btn">
                        <img src="imagenes/iconos/icono_guardado.png" width="25">
                    </button>
                </div>
                <img src="imagenes/img_4.png"
                    height="170"
                    class="pub-card__img"
                >
                <div class="pub-card__description">
                    <div class="pub-card__description--attribute">
                        <img src="imagenes/iconos/icono_huella.png" class="attribute__icon">
                        <label><b class="attribute__type">Especie:</b> Perro</label>
                    </div>
                    <div class="pub-card__description--attribute">
                        <img src="imagenes/iconos/icono_color.png" class="attribute__icon">
                        <label><b class="attribute__type">Color:</b> Cafe</label>
                    </div>
                    <div class="pub-card__description--attribute">
                        <img src="imagenes/iconos/icono_ubicacion.png" class="attribute__icon">
                        <label><b class="attribute__type">Ubicacion:</b> Tlajomulco, GDL</label>
                    </div>
                </div>
            </article>
            <article class="pub-card"></article>
            <article class="pub-card"></article>
            <article class="pub-card"></article>
            <article class="pub-card"></article>
            <article class="pub-card"></article>
        </main>
    </body>
</html>
