<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/login_styles.css"> <link rel="stylesheet" href="css/guardados_styles.css">
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            
            <h2 class="site-header__heading">Mis Guardados</h2>
            
            <button class="site-header__profile-btn">
                <span class="site-header__profile-label">Mi Perfil</span>
                <img class="site-header__profile-icon" src="imagenes/IconoPerfil.png" width="35" height="35">
            </button>
        </header>

        <main class="saved-feed">
            <article class="pub-card">
                <div class="pub-card__header">
                    <label class="pub-card__tag">¡Busca a su Familia!</label>
                    <button class="pub-card__save-btn">
                        <img src="imagenes/iconos/icono_guardado.png" width="20">
                    </button>
                </div>
                
                <div class="pub-card__image-container">
                    <img src="imagenes/img_4.png" class="pub-card__img">
                </div>

                <div class="pub-card__description">
                    <div class="attribute">
                        <img src="imagenes/iconos/icono_huella.png" class="attribute__icon">
                        <label><b class="attribute__type">Especie:</b> Perro</label>
                    </div>
                    <div class="attribute">
                        <img src="imagenes/iconos/icono_color.png" class="attribute__icon">
                        <label><b class="attribute__type">Color:</b> Café</label>
                    </div>
                    <div class="attribute">
                        <img src="imagenes/iconos/icono_ubicacion.png" class="attribute__icon">
                        <label><b class="attribute__type">Ubicación:</b> Tlajomulco, GDL</label>
                    </div>
                </div>
                <button class="pub-card__action-btn">Contactar</button>
            </article>

            <article class="pub-card pub-card--empty"></article>
            <article class="pub-card pub-card--empty"></article>
            <article class="pub-card pub-card--empty"></article>
        </main>
    </body>
</html>
