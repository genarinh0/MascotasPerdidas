<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huella - Publicación</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .pub-detail {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 120px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pub-detail__back {
            background: none;
            border: none;
            color: var(--color-primary);
            font-family: var(--font-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pub-detail__back:hover { text-decoration: underline; }

        /* Fila de tipo + acción */
        .pub-detail__topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pub-detail__badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-family: var(--font-primary);
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pub-detail__badge--lost  { background: #F15A5A; color: white; }
        .pub-detail__badge--found { background: #326295; color: white; }

        .pub-detail__action-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            font-family: var(--font-secondary);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pub-detail__action-btn--save {
            background: var(--color-primary);
            color: white;
        }

        .pub-detail__action-btn--save.saved {
            background: var(--color-secondary);
            color: var(--color-primary);
        }

        .pub-detail__action-btn--edit {
            background: var(--color-primary-light);
            color: white;
        }

        /* Carrusel */
        .pub-detail__carousel {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #eee;
            width: 100%;
            aspect-ratio: 4/3;
        }

        .carousel__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0; left: 0;
        }

        .carousel__img.active { display: block; }

        .carousel__btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.45);
            color: white;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 20px;
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel__btn--prev { left: 10px; }
        .carousel__btn--next { right: 10px; }

        .carousel__dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 2;
        }

        .carousel__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.2s;
        }

        .carousel__dot.active { background: white; }

        /* Cards */
        .pub-detail__card {
            background: white;
            border-radius: 14px;
            border: 1px solid #E4E0DA;
            padding: 16px;
            box-shadow: 0 2px 10px #1c1a1810;
        }

        .pub-detail__card-title {
            font-family: var(--font-secondary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--card-font-color);
            margin: 0 0 12px;
        }

        /* Atributos */
        .pub-detail__attrs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pub-detail__attr {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #313030;
        }

        .pub-detail__attr img {
            width: 18px;
            height: 18px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Descripción */
        .pub-detail__desc-text {
            margin: 0;
            font-size: 14px;
            color: #313030;
            line-height: 1.7;
        }

        /* Mapa */
        .pub-detail__map {
            height: 220px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #E4E0DA;
        }

        /* Compartir */
        .pub-detail__share-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .share-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-family: var(--font-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 100px;
        }

        .share-btn--whatsapp { background: #25D366; color: white; }
        .share-btn--facebook { background: #1877F2; color: white; }
        .share-btn--copy     { background: var(--bg); color: #313030; border: 1px solid #E4E0DA; }
        .share-btn img       { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header__brand">
            <img src="imagenes/logo.png" width="25" height="25" alt="Huella">
            <h1 class="site-header__brand-title">Huella</h1>
        </div>
        <h2 class="site-header__heading">Publicación</h2>
        <div class="site-header__user-actions">
            <button class="site-header__button" onclick="window.location.href='perfil.html'">Mi Perfil</button>
        </div>
    </header>

    <main class="pub-detail">
        <button class="pub-detail__back" id="btnVolver">← Volver</button>

        <!-- Tipo + acción -->
        <div class="pub-detail__topbar">
            <span class="pub-detail__badge" id="badge">Cargando...</span>
            <div id="contenedor-accion"></div>
        </div>

        <!-- Carrusel -->
        <div class="pub-detail__carousel" id="carousel"></div>

        <!-- Info -->
        <div class="pub-detail__card">
            <p class="pub-detail__card-title">Información</p>
            <div class="pub-detail__attrs" id="attrs"></div>
        </div>

        <!-- Descripción -->
        <div class="pub-detail__card">
            <p class="pub-detail__card-title">Descripción</p>
            <p class="pub-detail__desc-text" id="descripcion">Cargando...</p>
        </div>

        <!-- Mapa -->
        <div class="pub-detail__card" id="card-mapa" style="display:none;">
            <p class="pub-detail__card-title">Ubicación</p>
            <div class="pub-detail__map" id="mapa"></div>
        </div>

        <!-- Compartir -->
        <div class="pub-detail__card">
            <p class="pub-detail__card-title">¡Ayúdanos a compartir!</p>
            <div class="pub-detail__share-btns">
                <button class="share-btn share-btn--whatsapp" id="btnWhatsapp">
                    <img src="imagenes/iconos/icono_whatsapp.png" alt="WhatsApp"> WhatsApp
                </button>
                <button class="share-btn share-btn--facebook" id="btnFacebook">
                    <img src="imagenes/iconos/icono_facebook.png" alt="Facebook"> Facebook
                </button>
                <button class="share-btn share-btn--copy" id="btnCopiar">🔗 Copiar enlace</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="feed.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnFeed.png" class="bottom-nav__icon">
        </a>
        <a href="guardados.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnGuardados.png" class="bottom-nav__icon">
        </a>
        <a href="chats.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnChats.png" class="bottom-nav__icon">
        </a>
        <a href="misPublicaciones.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnMisPost.png" class="bottom-nav__icon">
        </a>
    </nav>

    <script src="js/publicacion.js"></script>
</body>
</html>
