<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huella - Chats</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/chats.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="site-header__brand">
            <img src="imagenes/logo.png" width="25" height="25" alt="Huella">
            <h1 class="site-header__brand-title">Huella</h1>
        </div>
        <div class="site-header__user-actions">
            <button class="site-header__button" onclick="window.location.href='perfil.html'">Mi Perfil</button>
        </div>
    </header>

    <!-- LAYOUT PRINCIPAL -->
    <div class="chats-layout">

        <!-- PANEL IZQUIERDO: Lista de conversaciones -->
        <aside class="chats-sidebar" id="chatsSidebar">
            <div class="chats-sidebar__header">
                <h2 class="chats-sidebar__title">Mensajes</h2>
                <span class="chats-sidebar__badge" id="badge-no-leidos" style="display:none;">0</span>
            </div>

            <div class="chats-sidebar__search">
                <input type="text" class="chats-search-input" id="buscarChat" placeholder="Buscar conversación...">
            </div>

            <ul class="chats-list" id="chatsList">
                <!-- Se llena dinámicamente -->
            </ul>

            <div class="chats-empty" id="chats-empty" style="display:none;">
                <p>No tienes conversaciones aún.</p>
                <p class="chats-empty__hint">Contacta al creador de una publicación para iniciar un chat.</p>
            </div>
        </aside>

        <!-- PANEL DERECHO: Conversación activa -->
        <main class="chats-conversation" id="chatsConversation">

            <!-- Estado vacío (cuando no hay chat seleccionado) -->
            <div class="chats-placeholder" id="chatsPlaceholder">
                <div class="chats-placeholder__icon">🐾</div>
                <h3 class="chats-placeholder__title">Tus mensajes</h3>
                <p class="chats-placeholder__text">Selecciona una conversación para ver los mensajes.</p>
            </div>

            <!-- Cabecera de la conversación activa -->
            <div class="chats-convo-header" id="convoHeader" style="display:none;">
                <button class="chats-back-btn" id="btnBack">←</button>
                <div class="chats-convo-header__avatar" id="convoAvatar">🐾</div>
                <div class="chats-convo-header__info">
                    <p class="chats-convo-header__name" id="convoName">—</p>
                    <p class="chats-convo-header__sub" id="convoSub">—</p>
                </div>
            </div>

            <!-- Mensajes -->
            <div class="chats-messages" id="chatsMessages" style="display:none;">
                <!-- Se llena dinámicamente -->
            </div>

            <!-- Input para escribir -->
            <div class="chats-input-area" id="chatsInputArea" style="display:none;">
                <div class="chats-warning" id="chatsWarning" style="display:none;">
                    <span>⚠️ Parece que estás compartiendo datos personales. ¿Deseas continuar?</span>
                    <div class="chats-warning__btns">
                        <button class="chats-warning__btn chats-warning__btn--cancel" id="btnCancelSend">Editar</button>
                        <button class="chats-warning__btn chats-warning__btn--confirm" id="btnConfirmSend">Enviar de todos modos</button>
                    </div>
                </div>
                <div class="chats-input-row">
                    <textarea class="chats-textarea" id="chatInput" placeholder="Escribe un mensaje..." rows="1"></textarea>
                    <button class="chats-send-btn" id="btnSend">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </main>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="feed.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnFeed.png" class="bottom-nav__icon">
        </a>
        <a href="guardados.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnGuardados.png" class="bottom-nav__icon">
        </a>
        <a href="chats.html" class="bottom-nav__item bottom-nav__item--active">
            <img src="imagenes/iconos/icono_BtnChats.png" class="bottom-nav__icon">
        </a>
        <a href="misPublicaciones.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnMisPost.png" class="bottom-nav__icon">
        </a>
    </nav>

    <script src="js/chats.js"></script>
</body>
</html>
