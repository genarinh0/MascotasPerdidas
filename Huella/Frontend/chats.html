<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huella - Chats</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/chats.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="site-header__brand">
            <img src="imagenes/logo.png" width="25" height="25" alt="Huella">
            <h1 class="site-header__brand-title">Huella</h1>
        </div>
        <div class="site-header__user-actions">
            <button class="site-header__button" onclick="window.location.href='perfil.html'">Mi Perfil</button>
        </div>
    </header>

    <!-- LAYOUT PRINCIPAL -->
    <div class="chats-layout">

        <!-- PANEL IZQUIERDO -->
        <aside class="chats-sidebar" id="chatsSidebar">
            <div class="chats-sidebar__header">
                <h2 class="chats-sidebar__title">Mensajes</h2>
            </div>

            <div class="chats-sidebar__search">
                <div class="search-wrapper">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="chats-search-input" id="buscarChat" placeholder="Buscar...">
                </div>
            </div>

            <ul class="chats-list" id="chatsList"></ul>

            <div class="chats-empty" id="chats-empty" style="display:none;">
                <div class="chats-empty__icon">🐾</div>
                <p class="chats-empty__title">Sin conversaciones aún</p>
                <p class="chats-empty__hint">Contacta al autor de una publicación para iniciar un chat.</p>
            </div>
        </aside>

        <!-- PANEL DERECHO -->
        <main class="chats-conversation" id="chatsConversation">
            <h1 style="align-self: center; font-size: 13px; color: rgba(68, 69, 70, 0.801);">⚠️ Recuerda no compartir datos sensibles o personales !!</h1>

            <!-- Placeholder -->
            <div class="chats-placeholder" id="chatsPlaceholder">
                <div class="chats-placeholder__paw">🐾</div>
                <h3 class="chats-placeholder__title">Tus mensajes</h3>
                <p class="chats-placeholder__text">Selecciona una conversación para comenzar.</p>
            </div>

            <!-- Header conversación -->
            <div class="chats-convo-header" id="convoHeader" style="display:none;">
                <button class="chats-back-btn" id="btnBack" aria-label="Volver">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="chats-convo-header__avatar" id="convoAvatar">🐾</div>
                <div class="chats-convo-header__info">
                    <p class="chats-convo-header__name" id="convoName">—</p>
                    <p class="chats-convo-header__sub" id="convoSub">En línea</p>
                </div>
            </div>

            <!-- Mensajes -->
            <div class="chats-messages" id="chatsMessages" style="display:none;"></div>

            <!-- Input -->
            <div class="chats-input-area" id="chatsInputArea" style="display:block;">
                <div class="chats-input-row">
                    <textarea
                        class="chats-textarea"
                        id="chatInput"
                        placeholder="Escribe un mensaje..."
                        rows="1"
                    ></textarea>
                    <button class="chats-send-btn" id="btnSend" aria-label="Enviar">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </main>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="feed.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnFeed.png" class="bottom-nav__icon">
        </a>
        <a href="guardados.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnGuardados.png" class="bottom-nav__icon">
        </a>
        <a href="chats.html" class="bottom-nav__item bottom-nav__item--active">
            <img src="imagenes/iconos/icono_BtnChats.png" class="bottom-nav__icon">
        </a>
        <a href="misPublicaciones.html" class="bottom-nav__item">
            <img src="imagenes/iconos/icono_BtnMisPost.png" class="bottom-nav__icon">
        </a>
    </nav>

    <script src="js/chat.js"></script>
</body>
</html>
