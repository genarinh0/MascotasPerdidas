<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
    </head>
    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <div class="site-header__user-actions">
                <button class="site-header__button">Mi Perfil</button>
            </div>
        </header>

        <nav class="filter-bar">
            <div class="filter-bar__container">
                <button class="filter-bar__clear">
                    <img src="imagenes/iconos/icono_borrar.png" width="20">
                </button>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_estatus.png" class="filter-button__icon">
                        <span class="filter-button__text">Estatus</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="estatus" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_color.png" class="filter-button__icon">
                        <span class="filter-button__text">Color</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="color" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_huella.png" class="filter-button__icon">
                        <span class="filter-button__text">Especie</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="especie" data-selectedValue="">
                        <button class="dropdown-item" data-value='perro'>Perro</button>
                        <button class="dropdown-item" data-value='gato'>Gato</button>
                        <button class="dropdown-item" data-value='conejo'>Conejo</button>
                        <button class="dropdown-item" data-value='ave'>Ave</button>
                        <button class="dropdown-item" data-value='otro'>Otro</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_ubicacion.png" class="filter-button__icon">
                        <span class="filter-button__text">Ubicación</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="ubicacion" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_tamaño.png" class="filter-button__icon">
                        <span class="filter-button__text">Tamaño</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="tamanio" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Chica</button>
                        <button class="dropdown-item" data-value=2>Mediana</button>
                        <button class="dropdown-item" data-value=3>Grande</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_fecha.png" class="filter-button__icon">
                        <span class="filter-button__text">Fecha</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="fecha" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
                <button class="filter-button filter-button--search" id="btnFilter">
                    <img src="https://media-public.canva.com/IS90g/MAHAgWIS90g/1/tl.png" class="filter-button__icon">
                </button>
            </div>
        </nav>

        <main class="post-grid">
            
            <article class="pub-card">
                <div class="pub-card__header">
                    <span class="pub-card__badge pub-card__badge--found">¡Busca a su familia!</span>
                    <button class="pub-card__icon-btn" title="Guardar publicación">
                        <img src="imagenes/iconos/icono_guardado.png" width="20" alt="Guardar">
                    </button>
                </div>

                <div class="pub-card__image-container">
                    <img src="./imagenes/img_1.png" class="pub-card__img" alt="Mascota encontrada">
                </div>
                
                <div class="pub-card__content">
                    <h3 class="pub-card__title">Desconocido</h3>
                    
                    <div class="pub-card__attributes">
                        <div class="attribute">
                            <img src="imagenes/iconos/icono_huella.png" class="attribute__icon" alt="Huella">
                            <label>Perro • Golden Retriever</label>
                        </div>
                        <div class="attribute">
                            <img src="imagenes/iconos/icono_ubicacion.png" class="attribute__icon" alt="Ubicación">
                            <label>Americana, GDL.</label>
                        </div>
                    </div>
                    
                    <button class="pub-card__btn pub-card__btn--primary">Ver Detalles</button>
                </div>
            </article>

            <article class="pub-card">
                <div class="pub-card__header">
                    <span class="pub-card__badge pub-card__badge--lost">¡Perdido!</span>
                    <button class="pub-card__icon-btn" title="Guardar publicación">
                        <img src="imagenes/iconos/icono_guardado.png" width="20" alt="Guardar">
                    </button>
                </div>

                <div class="pub-card__image-container">
                    <img src="./imagenes/img_5.png" class="pub-card__img" alt="Mascota perdida">
                </div>
                
                <div class="pub-card__content">
                    <h3 class="pub-card__title">Copito</h3>
                    
                    <div class="pub-card__attributes">
                        <div class="attribute">
                            <img src="imagenes/iconos/icono_huella.png" class="attribute__icon" alt="Huella">
                            <label>Perro • Blanco</label>
                        </div>
                        <div class="attribute">
                            <img src="imagenes/iconos/icono_ubicacion.png" class="attribute__icon" alt="Ubicación">
                            <label>Americana, GDL.</label>
                        </div>
                    </div>
                    
                    <button class="pub-card__btn pub-card__btn--primary">Ver Detalles</button>
                </div>
            </article>

        </main> 

        <footer class="site-footer" style="text-align: center; padding: 40px; color: var(--card-font-color); font-size: 12px;">
            <p>&copy; 2026 Huella - Ayudando a mascotas a volver a casa.</p>
        </footer>

        <script>
            const btnUsarFiltros = document.getElementById("btnFilter");
            btnUsarFiltros.addEventListener('click', getFeed);

            const dropdowns = document.querySelectorAll('.dropdown');
            dropdowns.forEach(dropdown => {
                const btnFilter = dropdown.querySelector(".filter-button");
                const options = dropdown.querySelectorAll(".dropdown-item");
                const optionsList = dropdown.querySelector(".dropdown-options");

                btnFilter.addEventListener('click', () => {
                    optionsList.classList.toggle('open');
                    document.querySelectorAll('.dropdown').forEach(other => {
                        if (other !== dropdown) {
                            other.querySelector('.dropdown-options').classList.remove('open');
                        }
                    });
                });

                options.forEach(option => {
                    const baseText = btnFilter.textContent;
                    dropdown.dataset.baseText = baseText;

                    option.addEventListener('click', () => {
                        dropdown.querySelector('.filter-button__text').textContent = baseText + ': ' + option.textContent;
                        optionsList.dataset.selectedValue = option.dataset.value;
                    })
                })
            })

            const btnClearFilters = document.querySelector('.filter-bar__clear');
            btnClearFilters.addEventListener('click', () => {
                dropdowns.forEach(dropdown => {
                    const baseText = dropdown.dataset.baseText;
                    dropdown.querySelector('.filter-button__text').textContent = baseText;
                    dropdown.querySelector('.dropdown-options').classList.remove('open');
                });
            })

            async function getFeed(){
                let url = 'http://localhost:1984/api/publicaciones';

                const filters = {};

                document.querySelectorAll('.dropdown-options').forEach(group => {
                    const groupName = group.dataset.filterGroup;
                    const value = group.dataset.selectedValue;

                    filters[groupName] = value ?? "";
                });

                const nonEmptyFilters = [];

                Object.entries(filters).forEach(([key, value]) => {
                    if (value !== ""){
                        nonEmptyFilters.push(`${key}=${value}`);
                    }
                });

                if (nonEmptyFilters.length > 0){
                    url += '?' + nonEmptyFilters.join('&');
                }

                console.log(url);
                
                /*
                try{
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    // con las publicaciones devueltas ahora a meterlas al feed
                    // no renderizar todas de un jalon (ver que rollo)
                }catch (error){
                    console.error('Error de red: ', error);
                    alert("Error del servidor");
                }
                */
            }
        </script>
    </body>
</html>
