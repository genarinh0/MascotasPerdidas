<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
        <script type="module" src="./componentes/post-card.js"></script>
    </head>
    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <h2 class="site-header__heading">Feed</h2>
            <div class="site-header__user-actions">
                <button class="site-header__button">Mi Perfil</button>
            </div>
        </header>

        <nav class="filter-bar">
            <div class="filter-bar__container">
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_estatus.png" class="filter-button__icon">
                        <span class="filter-button__text">Estatus</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="tipo" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
<div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_color.png" class="filter-button__icon">
                        <span class="filter-button__text">Color</span>
                    </button>
                    <div class="dropdown-options dropdown-options--grid" data-filter-group="color">
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="1" hidden>
                            <span class="color-dot" style="background:#1a1a1a" title="Negro"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="2" hidden>
                            <span class="color-dot" style="background:#7e7e7e" title="Gris oscuro"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="3" hidden>
                            <span class="color-dot" style="background:#c0c0c0" title="Gris claro"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="4" hidden>
                            <span class="color-dot" style="background:#f7f7f7; border: 1px solid #ddd" title="Blanco"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="5" hidden>
                            <span class="color-dot" style="background:#5f6e7a" title="Gris azulado"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="6" hidden>
                            <span class="color-dot" style="background:#5dade2" title="Azul"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="7" hidden>
                            <span class="color-dot" style="background:#4a2e1a" title="Café oscuro"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="8" hidden>
                            <span class="color-dot" style="background:#b68a60" title="Café"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="9" hidden>
                            <span class="color-dot" style="background:#e8d5b5" title="Crema"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="10" hidden>
                            <span class="color-dot" style="background:#d88c3a" title="Naranja/Siena"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="11" hidden>
                            <span class="color-dot" style="background:#f2d024" title="Amarillo"></span>
                        </label>
                        <label class="color-option">
                            <input type="checkbox" name="filter-color" value="12" hidden>
                            <span class="color-dot" style="background:#4caf50" title="Verde"></span>
                        </label>
                    </div>
                </div>                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_huella.png" class="filter-button__icon">
                        <span class="filter-button__text">Especie</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="especie" data-selectedValue="">
                        <button class="dropdown-item" data-value='perro'>Perro</button>
                        <button class="dropdown-item" data-value='gato'>Gato</button>
                        <button class="dropdown-item" data-value='conejo'>Conejo</button>
                        <button class="dropdown-item" data-value='ave'>Ave</button>
                        <button class="dropdown-item" data-value='otro'>Otro</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_ubicacion.png" class="filter-button__icon">
                        <span class="filter-button__text">Ubicación</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="ubicacion" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_tamaño.png" class="filter-button__icon">
                        <span class="filter-button__text">Tamaño</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="tamanio" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Chica</button>
                        <button class="dropdown-item" data-value=2>Mediana</button>
                        <button class="dropdown-item" data-value=3>Grande</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="filter-button">
                        <img src="imagenes/iconos/icono_fecha.png" class="filter-button__icon">
                        <span class="filter-button__text">Fecha</span>
                    </button>
                    <div class="dropdown-options" data-filter-group="fecha" data-selectedValue="">
                        <button class="dropdown-item" data-value=1>Perdida</button>
                        <button class="dropdown-item" data-value=2>Refugiada</button>
                        <button class="dropdown-item" data-value=3>Resuelto</button>
                    </div>
                </div>
                <button class="filter-button filter-button--search" id="btnFilter">
                    <img src="https://media-public.canva.com/IS90g/MAHAgWIS90g/1/tl.png" class="filter-button__icon">
                    <span id="btnFilterText" style="display:none;">BUSCAR</span>
                </button>
            </div>
        </nav>

        <main class="post-grid">

        </main>

        <script src="js/feed.js"></script>

        <a href="crearPublicacion.html" class="fab-btn" aria-label="Crear nueva publicación">
            <span class="fab-btn__icon">+</span>
        </a>
        <nav class="bottom-nav">
            <a href="feed.html" class="bottom-nav__item bottom-nav__item--active">
                <img src="imagenes/iconos/icono_BtnFeed.png" class="bottom-nav__icon">
                <span class="bottom-nav__label">Feed</span>
            </a>
            <a href="guardados.html" class="bottom-nav__item">
                <img src="imagenes/iconos/icono_BtnGuardados.png" class="bottom-nav__icon">
                <span class="bottom-nav__label">Guardados</span>
            </a>
            <a href="chats.html" class="bottom-nav__item">
                <img src="imagenes/iconos/icono_BtnChats.png" class="bottom-nav__icon">
                <span class="bottom-nav__label">Chats</span>
            </a>
            <a href="misPublicaciones.html" class="bottom-nav__item">
                <img src="imagenes/iconos/icono_BtnMisPost.png" class="bottom-nav__icon">
                <span class="bottom-nav__label">Mis Posts</span>
            </a>
</nav>
    </body>
</html>
