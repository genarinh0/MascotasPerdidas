<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/login_styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script src="config.js"></script>
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png"
                    width="25" height="25"
                >
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            <button class="site-header__button" id="btnSignup">Registrarse</button>
        </header>

        <main class="login-section">
            <section class="login-section__welcome">
                <img src="imagenes/img_5.png">
                <p class="welcome__title">¡Bienvenido a Huella!</p>
                <p class="welcome__subtitle">La pagina que te ayuda a encontrar mascotas perdidas!</p>
            </section>
            <section class="login-section__card">
                <label class="card__title">Inicia Sesión</label>
                <div id="google-button"></div>
                <div class="card__divider">
                    <span class="card__divider-text">o con tu email</span>
                </div>
                <div class="card__inputs">
                    <div class="card__field">
                        <label class="card__label">Email</label>
                        <input class="card__input" placeholder="tu@email.com" id="email">
                    </div>
                    <div class="card__field">
                        <label class="card__label">Contraseña</label>
                        <input class="card__input" type="password" placeholder="••••••••" id="password">
                    </div>
                </div>
                <a class="card__link card__link--pwd" href="recuperarPwd.html">¿Olvidaste tu contraseña?</a>
                <button class="card__btn card__btn--send" id="btnLogin">Iniciar Sesion</button>
                <p class="card__hint">¿No tienes cuenta?
                    <a class="card__link" href="signup.html" >Registrate aqui</a>
                </p>
            </section>
        </main>
        <script src="js/login.js"></script>
    </body>
</html>
