<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/login_styles.css"> <link rel="stylesheet" href="css/guardados_styles.css"> <link rel="stylesheet" href="css/misPublicaciones_styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>
            
            <h2 class="site-header__heading">Mis Publicaciones</h2>
            
            <button class="site-header__profile-btn">
                <span class="site-header__profile-label">Mi Perfil</span>
                <img class="site-header__profile-icon" src="imagenes/IconoPerfil.png" width="35" height="35">
            </button>
        </header>

        <main class="management-container">
            <div class="management-header">
                <p class="management-header__stats">Tienes <b>3</b> publicaciones activas</p>
                <button class="management-header__add-btn">
                    <span>+</span> Nueva Publicación
                </button>
            </div>

            <section class="saved-feed"> <article class="pub-card">
                    <div class="pub-card__header">
                        <label class="pub-card__tag">Estado: <span class="tag--active">Activa</span></label>
                        <div class="pub-card__owner-actions">
                            <button class="action-btn--edit"><img src="imagenes/iconos/icono_editar.png" width="18"></button>
                        </div>
                    </div>
                    
                    <div class="pub-card__image-container">
                        <img src="./imagenes/img_1.png" class="pub-card__img"> </div>

                    <div class="pub-card__description">
                        <div class="attribute">
                            <img src="imagenes/iconos/icono_huella.png" class="attribute__icon">
                            <label><b class="attribute__type">Especie:</b> Gato</label>
                        </div>
                        <div class="attribute">
                            <img src="imagenes/iconos/icono_ubicacion.png" class="attribute__icon">
                            <label><b class="attribute__type">Visto en:</b> Santa Fe, CDMX</label>
                        </div>
                    </div>

                    <div class="pub-card__footer-actions">
                        <button class="card-btn card-btn--resolve">¡Lo encontré!</button>
                        <button class="card-btn card-btn--delete">Eliminar</button>
                    </div>
                </article>

                <article class="pub-card pub-card--empty"></article>
            </section>
        </main>
    </body>
</html>
