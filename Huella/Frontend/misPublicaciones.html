<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://fonts.googleapis.com" rel="stylesheet">
        <script type="module" src="./componentes/post-card.js"></script>
    </head>

    <body>
        <header class="site-header">
            <div class="site-header__brand">
                <img src="imagenes/logo.png" width="25" height="25">
                <h1 class="site-header__brand-title">Huella</h1>
            </div>

            <h2 class="site-header__heading">Mis Publicaciones</h2>

            <button class="site-header__profile-btn">
                <span class="site-header__profile-label">Mi Perfil</span>
                <img class="site-header__profile-icon" src="imagenes/IconoPerfil.png" width="35" height="35">
            </button>
        </header>

        <main class="management-container">
            <div class="management-header">
                <p class="management-header__stats" id="stats-text">Cargando publicaciones...</p>
                <button class="management-header__add-btn" onclick="window.location.href='crearPublicacion.html'">
                    <span>+</span> Nueva Publicación
                </button>
            </div>

            <section class="post-grid" id="grid-mis-pubs" style="padding: 0; margin: 20px 0;">
            </section>
        </main>

        <script src="../Backend/misPublicaciones.js"></script>
    </body>
</html>
